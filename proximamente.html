<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Curaduría · En camino</title>
  <meta name="description" content="La plataforma cultural está en camino. Disponible desde mayo 4 de 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0F1210;
      --cream:#FFFFF6;
      --cyan:#75E6F9;
      --coral:#FF736C;
      --t2:rgba(255,255,246,.65);
      --t3:rgba(255,255,246,.38);
      --t4:rgba(255,255,246,.22);
      --bord:rgba(168,192,160,.12);
    }
    html,body{
      width:100%;height:100%;
      background:var(--bg);
      color:var(--cream);
      font-family:'DM Mono',monospace;
      overflow:hidden;
    }
    /* Full screen overlay — bloquea todo */
    #overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }
    /* Grid de fondo */
    #overlay::before{
      content:'';
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(var(--bord) 1px,transparent 1px),
        linear-gradient(90deg,var(--bord) 1px,transparent 1px);
      background-size:80px 80px;
      opacity:.2;
      pointer-events:none;
    }
    /* Radial glow */
    #overlay::after{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(117,230,249,.04),transparent);
      pointer-events:none;
    }
    .inner{
      max-width:520px;
      width:100%;
      text-align:center;
      position:relative;
      z-index:1;
    }
    .logo-spin{
      display:inline-block;
      margin-bottom:36px;
      animation:spin 12s linear infinite;
    }
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .date{
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--cyan);
      margin-bottom:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .date::before,.date::after{
      content:'';
      width:32px;
      height:1px;
      background:rgba(117,230,249,.3);
    }
    h1{
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(36px,8vw,72px);
      font-weight:900;
      text-transform:uppercase;
      line-height:.9;
      letter-spacing:-.02em;
      color:var(--cream);
      margin-bottom:18px;
    }
    h1 span{color:var(--cyan);}
    p{
      font-size:15px;
      font-weight:400;
      color:var(--t2);
      line-height:1.8;
      margin-bottom:36px;
    }
    p b{color:var(--cream);font-weight:500;}
    .btns{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:36px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-family:'DM Mono',monospace;
      font-size:10px;
      font-weight:500;
      letter-spacing:.14em;
      text-transform:uppercase;
      text-decoration:none;
      padding:12px 22px;
      border-radius:4px;
      cursor:pointer;
      transition:opacity .2s;
      border:none;
    }
    .btn:hover{opacity:.85;}
    .btn-outline{
      background:transparent;
      color:var(--cream);
      border:1px solid rgba(255,255,246,.2);
    }
    .btn-coral{
      background:var(--coral);
      color:#0F1210;
    }
    .footer-note{
      font-size:9px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--t4);
    }
    .footer-note a{
      color:var(--t3);
      text-decoration:none;
    }
    .footer-note a:hover{color:var(--cream);}
  </style>
</head>
